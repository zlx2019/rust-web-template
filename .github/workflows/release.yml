name: Release

# 工作流触发条件：推送以 v 开头的 tag时(如v0.1.0)
#   - 生成 Changelog
#   - 创建 Github Release
on:
  push:
    tags:
      - "v*"

# Grant write permission(Upload binary products required)
# 授予写权限(创建Release、上传二进制产物必需)
permissions:
  contents: write

# 要执行的任务合集
jobs:
  changelog:
    name: Changelog
    runs-on: ubuntu-latest  # 虚拟机平台
    # 要执行的步骤, 从上到下依次执行
    steps:
      # 拉取完整的 git 历史
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 依据 cliff.toml 生成本次发布的 Changelog
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      # 创建 GitHub Release，正文使用上一步生成的 Changelog
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGES.md
          token: ${{ secrets.GITHUB_TOKEN }}
  # 构建跨平台二进制产物
  build:
    name: Build ${{ matrix.target }}
    if: github.repository != 'zlx2019/rust-web-template'
    # 需要先创建完 Release
    needs: changelog
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # 各目标均在对应原生 runner 上编译，无需交叉工具链
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      # 二进制名 = 包名，从 Cargo.toml 读取（workflow 不参与模板渲染，取不到 {{project-name}}）
      - name: Resolve binary name
        id: meta
        shell: bash
        run: echo "bin=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')" >> "$GITHUB_OUTPUT"
      # 编译并打包（unix → tar.gz，windows → zip）后附加到 Release
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: ${{ steps.meta.outputs.bin }}
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          include: README.md,LICENSE
          leading-dir: true
          token: ${{ secrets.GITHUB_TOKEN }}
