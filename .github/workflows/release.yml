name: Release

# 推送 v* 标签时：
#   1. 生成 Changelog 并创建 GitHub Release
#   2. 构建多平台二进制并附加到 Release
#   3. 发布到 crates.io（预发布版本跳过）
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # 生成 Changelog 并创建 GitHub Release
  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          # 预发布标签（含 "-"，如 v1.0.0-rc.1）尚未入 cliff 的 tag 序列，用 --unreleased 生成
          args: ${{ contains(github.ref_name, '-') && format('--unreleased --tag {0}', github.ref_name) || '--latest' }} --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGES.md
          token: ${{ secrets.GITHUB_TOKEN }}
          # SemVer 预发布版本（含 "-"）自动标记为 Pre-release
          prerelease: ${{ contains(github.ref_name, '-') }}

  # 解析二进制名。模板仓库自身的 Cargo.toml 含占位符，cargo 无法解析，直接跳过
  meta:
    name: Resolve package metadata
    if: github.repository != 'zlx2019/rust-web-template'
    runs-on: ubuntu-latest
    outputs:
      bin: ${{ steps.meta.outputs.bin }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        shell: bash
        run: echo "bin=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')" >> "$GITHUB_OUTPUT"

  # 构建多平台二进制并附加到 Release
  build:
    name: Build ${{ matrix.target }}
    needs: [changelog, meta]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      # Linux 交叉编译目标（aarch64 / musl）需要对应的链接器与 C 工具链
      - name: Setup cross toolchain
        if: runner.os == 'Linux'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
      # 编译并打包（Unix → tar.gz，Windows → zip），附加到 Release
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: ${{ needs.meta.outputs.bin }}
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          include: README.md,LICENSE
          leading-dir: true
          # 每个产物附带 sha256 校验和文件，供下载方验证完整性
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  # 未配置 CARGO_REGISTRY_TOKEN secret 时自动跳过发布（CI 仍视为成功）
  publish:
    name: Publish to crates.io
    needs: build
    # 预发布版本（含 "-"）不发布
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    # job 级 if 无法访问 secrets 上下文，将 secret 注入 env 后在 step 级判断
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Skip notice
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: echo "::notice::未配置 CARGO_REGISTRY_TOKEN secret，跳过 crates.io 发布"
      - uses: actions/checkout@v4
        if: env.CARGO_REGISTRY_TOKEN != ''
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        if: env.CARGO_REGISTRY_TOKEN != ''
      # tag 与 Cargo.toml 版本不一致时中止，防止发出与 tag 不符的版本
      - name: Verify tag matches package version
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: |
          pkg=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          if [ "v$pkg" != "${{ github.ref_name }}" ]; then
            echo "::error::tag ${{ github.ref_name }} 与 Cargo.toml 版本 $pkg 不一致"
            exit 1
          fi
      - name: Publish
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish --locked
