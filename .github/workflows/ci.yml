# 生成项目的 CI。
# 所有 job 都带有 repository 守卫：模板仓库（zlx2019/rust-web-template）自身的
# Cargo.toml 含 {{project-name}} 占位符，cargo 无法解析，因此在模板仓库中
# 全部跳过（模板仓库由 template-ci.yml 负责检查）。
name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一分支的并发任务，新提交会取消正在进行的旧任务，节省 CI 资源
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # 格式化与 Clippy 静态检查
  lint:
    name: Format & Clippy
    if: github.repository != 'zlx2019/rust-web-template'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # 单元测试与集成测试（使用 nextest）
  test:
    name: Test
    if: github.repository != 'zlx2019/rust-web-template'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - name: cargo nextest
        run: cargo nextest run --all-features --no-tests pass

  # 依赖的安全公告与许可证审计
  deny:
    name: Cargo Deny
    if: github.repository != 'zlx2019/rust-web-template'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # 拼写检查
  typos:
    name: Typos
    if: github.repository != 'zlx2019/rust-web-template'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # 锁定版本，避免上游 master 变更导致 CI 意外失败（dependabot 会定期升级）
      - uses: crate-ci/typos@v1.48.0
